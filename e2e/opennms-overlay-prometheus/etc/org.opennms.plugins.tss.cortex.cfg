# Cortex TSS Plugin Configuration — Vanilla Prometheus backend
# Prometheus accepts remote write natively (--web.enable-remote-write-receiver)
readUrl=http://prometheus:9090/api/v1
writeUrl=http://prometheus:9090/api/v1/write

maxConcurrentHttpConnections=100
writeTimeoutInMs=5000
readTimeoutInMs=30000
metricCacheSize=1000
externalTagsCacheSize=1000
bulkheadMaxWaitDuration=9223372036854775807
maxSeriesLookback=31536000
organizationId=
useLabelValuesForDiscovery=true
discoveryBatchSize=50
