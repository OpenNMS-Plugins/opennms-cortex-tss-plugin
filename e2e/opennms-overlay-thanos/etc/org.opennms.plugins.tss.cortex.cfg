# Cortex TSS Plugin Configuration — Thanos backend
# Thanos Query provides the Prometheus-compatible read API
readUrl=http://thanos-query:10902/api/v1
# Thanos Receive accepts Prometheus remote write
writeUrl=http://thanos-receive:19291/api/v1/receive

maxConcurrentHttpConnections=100
writeTimeoutInMs=5000
readTimeoutInMs=30000
metricCacheSize=1000
externalTagsCacheSize=1000
bulkheadMaxWaitDuration=9223372036854775807
maxSeriesLookback=31536000
organizationId=
useLabelValuesForDiscovery=true
discoveryBatchSize=50
